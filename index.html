<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scorecard GTM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Pro Display', 'Helvetica Neue', 'Switzer', sans-serif;
      color: #2F3437;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #FBFBFA;
      overflow-x: hidden;
    }

    #three-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      max-width: 680px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeIn 600ms cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    .hero h1 {
      font-family: 'Instrument Serif', 'Newsreader', 'Playfair Display', serif;
      font-size: 4.5rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: #1a2744;
      margin-bottom: 1.5rem;
    }

    .hero p {
      font-size: 1.15rem;
      color: #787774;
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto;
    }

    footer {
      text-align: center;
      padding: 2.5rem 2rem;
      font-size: 0.8rem;
      color: #787774;
      letter-spacing: 0.03em;
      border-top: 1px solid #EAEAEA;
      position: relative;
      z-index: 1;
      background: rgba(251, 251, 250, 0.85);
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .hero h1 {
        font-size: 2.8rem;
      }
      .hero p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="three-bg"></canvas>
  <main>
    <div class="hero">
      <h1>Scorecard GTM</h1>
      <p>Bespoke go-to-market advisory, scoring, and sourcing for companies that refuse to leave growth to chance.</p>
    </div>
  </main>
  <footer>
    &copy; 2026 Scorecard GTM, LLC
  </footer>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('three-bg');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 18;

    // Palette from the design
    const navy = new THREE.Color('#1a2744');
    const gold = new THREE.Color('#b8942e');
    const warmRose = new THREE.Color('#9F2F2D');
    const deepTeal = new THREE.Color('#1F6C9F');

    // --- Main point cloud on a sphere surface ---
    const pointCount = 300;
    const pointPositions = new Float32Array(pointCount * 3);
    for (let i = 0; i < pointCount; i++) {
      const phi = Math.acos(2 * Math.random() - 1);
      const theta = Math.random() * Math.PI * 2;
      const r = 6 + Math.random() * 0.5;
      pointPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      pointPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      pointPositions[i * 3 + 2] = r * Math.cos(phi);
    }
    const pointGeo = new THREE.BufferGeometry();
    pointGeo.setAttribute('position', new THREE.BufferAttribute(pointPositions, 3));
    const pointMat = new THREE.PointsMaterial({
      color: navy,
      size: 1.5,
      transparent: true,
      opacity: 0.06,
      sizeAttenuation: true
    });
    const points = new THREE.Points(pointGeo, pointMat);
    scene.add(points);

    // --- Diamond clusters: a few highlighted points that glow subtly ---
    function makeCluster(center, color, count, spread, size, opacity) {
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        positions[i * 3] = center[0] + (Math.random() - 0.5) * spread;
        positions[i * 3 + 1] = center[1] + (Math.random() - 0.5) * spread;
        positions[i * 3 + 2] = center[2] + (Math.random() - 0.5) * spread;
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({
        color,
        size,
        transparent: true,
        opacity,
        sizeAttenuation: true
      });
      return new THREE.Points(geo, mat);
    }

    // Three small clusters, like finding signal in noise
    const clusterA = makeCluster([4.2, 3.8, -2], gold, 8, 0.8, 3, 0.18);
    const clusterB = makeCluster([-5, -2.5, 1], warmRose, 6, 0.7, 2.5, 0.14);
    const clusterC = makeCluster([1.5, -4.5, -3], deepTeal, 7, 0.9, 2.8, 0.16);
    scene.add(clusterA, clusterB, clusterC);

    // --- Mouse parallax ---
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    // --- Animate ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      points.rotation.y = t * 0.015;
      points.rotation.x = t * 0.008;

      // Discovery blips: clusters flash on like radar pings then fade
      function blip(elapsed, period, peakOpacity) {
        const cycle = elapsed % period;
        const flashDuration = 0.3;
        const holdDuration = 1.2;
        const fadeDuration = 2.0;
        if (cycle < flashDuration) {
          // Sharp flash in
          return peakOpacity * (cycle / flashDuration);
        } else if (cycle < flashDuration + holdDuration) {
          // Hold bright with a subtle flicker
          return peakOpacity * (0.85 + Math.sin(cycle * 12) * 0.15);
        } else if (cycle < flashDuration + holdDuration + fadeDuration) {
          // Slow fade out
          const fadeProgress = (cycle - flashDuration - holdDuration) / fadeDuration;
          return peakOpacity * (1 - fadeProgress) * 0.5;
        }
        return 0.02;
      }

      clusterA.material.opacity = blip(t, 7, 0.25);
      clusterB.material.opacity = blip(t + 2.5, 9, 0.20);
      clusterC.material.opacity = blip(t + 5, 8, 0.22);

      // Subtle mouse parallax on camera
      camera.position.x += (mouseX * 0.8 - camera.position.x) * 0.02;
      camera.position.y += (-mouseY * 0.5 - camera.position.y) * 0.02;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
