<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scorecard GTM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Pro Display', 'Helvetica Neue', 'Switzer', sans-serif;
      color: #2F3437;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #FBFBFA;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .hero {
      text-align: center;
      max-width: 680px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeIn 600ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .hero h1 {
      font-family: 'Instrument Serif', 'Newsreader', 'Playfair Display', serif;
      font-size: 4.5rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: #1a2744;
      margin-bottom: 1.5rem;
    }

    .hero p {
      font-size: 1.15rem;
      color: #787774;
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto;
    }

    footer {
      text-align: center;
      padding: 2.5rem 2rem;
      font-size: 0.8rem;
      color: #787774;
      letter-spacing: 0.03em;
      border-top: 1px solid #EAEAEA;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .hero h1 {
        font-size: 2.8rem;
      }
      .hero p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <h1>Scorecard GTM</h1>
      <p>Bespoke go-to-market advisory, scoring, and sourcing for companies that refuse to leave growth to chance.</p>
    </div>
  </main>
  <footer>
    &copy; 2026 Scorecard GTM, LLC
  </footer>
</body>
</html>
